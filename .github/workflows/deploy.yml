name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Build
        run: |
          mkdir dist
          GOOS=js GOARCH=wasm go build -o dist/main.wasm .
          cp $(go env GOROOT)/lib/wasm/wasm_exec.js dist/
          cp -r assets dist/
          cat > dist/index.html <<'LANDING'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Xandaris II — Space Trading Game</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background: #0a0c14; color: #c0c8d8; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
            .container { max-width: 640px; text-align: center; padding: 40px 20px; }
            h1 { color: #7fdbca; font-size: 2.5em; margin-bottom: 8px; letter-spacing: 2px; }
            .tagline { color: #667; margin-bottom: 32px; font-size: 1.1em; }
            .auth-section { margin-bottom: 32px; }
            .discord-btn { display: inline-flex; align-items: center; gap: 10px; background: #5865F2; color: #fff; font-family: inherit; font-size: 1em; padding: 12px 28px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
            .discord-btn:hover { background: #4752c4; }
            .discord-btn svg { width: 20px; height: 20px; fill: #fff; }
            .user-panel { background: #12162a; border: 1px solid #1e2844; border-radius: 8px; padding: 20px; text-align: left; }
            .user-panel h2 { color: #7fdbca; font-size: 1.1em; margin-bottom: 12px; }
            .user-panel .field { margin-bottom: 10px; }
            .user-panel label { color: #889; font-size: 0.8em; display: block; margin-bottom: 4px; }
            .api-key-box { display: flex; gap: 8px; align-items: center; }
            .api-key-box code { flex: 1; background: #0a0c14; border: 1px solid #1e2844; padding: 8px; border-radius: 4px; font-size: 0.85em; color: #7fdbca; word-break: break-all; }
            .copy-btn { background: #1e2844; color: #c0c8d8; border: 1px solid #2a3660; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8em; }
            .copy-btn:hover { background: #2a3660; }
            .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
            .actions a { flex: 1; text-align: center; background: #12162a; border: 1px solid #1e2844; border-radius: 6px; padding: 12px; text-decoration: none; color: #c0c8d8; font-size: 0.9em; transition: border-color 0.2s; }
            .actions a:hover { border-color: #7fdbca; }
            .actions a span { display: block; color: #7fdbca; font-size: 0.75em; margin-top: 4px; }
            .signout { background: none; border: none; color: #556; font-family: inherit; font-size: 0.75em; cursor: pointer; margin-top: 12px; }
            .signout:hover { color: #889; }
            .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
            .card { background: #12162a; border: 1px solid #1e2844; border-radius: 8px; padding: 24px; width: 260px; text-align: left; text-decoration: none; color: #c0c8d8; transition: border-color 0.2s; }
            .card:hover { border-color: #7fdbca; }
            .card h2 { color: #7fdbca; font-size: 1.1em; margin-bottom: 8px; }
            .card p { color: #889; font-size: 0.85em; line-height: 1.4; }
            .card .badge { display: inline-block; font-size: 0.7em; padding: 2px 8px; border-radius: 4px; margin-top: 12px; }
            .live { background: #1a3a1a; color: #6c6; }
            .demo { background: #1a2a3a; color: #6ac; }
            .stats { margin-top: 24px; color: #556; font-size: 0.8em; }
            .footer { margin-top: 40px; font-size: 0.75em; color: #445; }
            .footer a { color: #557; }
            #pop { color: #7fdbca; }
          </style>
          </head>
          <body>
          <div class="container">
            <h1>XANDARIS II</h1>
            <p class="tagline">A fully-simulated space economy driven by supply and demand</p>

            <!-- Auth section: sign-in or user panel -->
            <div class="auth-section">
              <div id="signed-out">
                <a class="discord-btn" href="https://api.xandaris.space/api/auth/discord">
                  <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                  Sign in with Discord
                </a>
              </div>
              <div id="signed-in" style="display:none">
                <div class="user-panel">
                  <h2 id="welcome">Welcome back</h2>
                  <div class="field">
                    <label>Your API Key</label>
                    <div class="api-key-box">
                      <code id="api-key"></code>
                      <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('api-key').textContent)">Copy</button>
                    </div>
                  </div>
                  <div class="actions">
                    <a id="play-link" href="play.html">Play Online<span>Join live server</span></a>
                    <a href="https://api.xandaris.space/" target="_blank">Spectator<span>Live server</span></a>
                    <a href="live.html">Dashboard<span>Economy data</span></a>
                  </div>
                  <center><button class="signout" onclick="signOut()">Sign out</button></center>
                </div>
              </div>
            </div>

            <!-- Info cards for non-authenticated visitors -->
            <div id="guest-cards" class="cards">
              <a class="card" href="https://api.xandaris.space/" target="_blank">
                <h2>Live Server</h2>
                <p>Watch the real-time economy — AI factions trading, prices moving, cargo ships in transit.</p>
                <span class="badge live">LIVE</span>
              </a>
              <a class="card" href="play.html">
                <h2>Play Demo</h2>
                <p>Run a standalone game in your browser. Build mines, trade resources, grow your empire.</p>
                <span class="badge demo">WASM</span>
              </a>
            </div>

            <p class="stats" id="stats">Connecting to server...</p>
            <p class="footer">
              <a href="https://github.com/hunterjsb/xandaris">GitHub</a> •
              Go + Ebitengine
            </p>
          </div>
          <script>
          // Handle OAuth callback — credentials come in URL fragment
          (function() {
            const hash = location.hash.substring(1);
            if (hash) {
              const params = new URLSearchParams(hash);
              const key = params.get('key');
              if (key) {
                localStorage.setItem('xn_api_key', key);
                localStorage.setItem('xn_name', params.get('name') || '');
                localStorage.setItem('xn_player_id', params.get('player_id') || '');
                history.replaceState(null, '', location.pathname);
              }
            }
          })();

          function signOut() {
            localStorage.removeItem('xn_api_key');
            localStorage.removeItem('xn_name');
            localStorage.removeItem('xn_player_id');
            location.reload();
          }

          // Render auth state
          const apiKey = localStorage.getItem('xn_api_key');
          const name = localStorage.getItem('xn_name');
          if (apiKey) {
            document.getElementById('signed-out').style.display = 'none';
            document.getElementById('signed-in').style.display = 'block';
            document.getElementById('guest-cards').style.display = 'none';
            document.getElementById('welcome').textContent = 'Welcome, ' + name;
            document.getElementById('api-key').textContent = apiKey;
            // Set play link to connect to live server with credentials
            const playParams = new URLSearchParams({server:'https://api.xandaris.space',player:name,key:apiKey});
            document.getElementById('play-link').href = 'play.html?' + playParams.toString();
          }

          // Live stats
          fetch('https://api.xandaris.space/api/economy').then(r=>r.json()).then(d=>{
            const e=d.data;
            document.getElementById('stats').innerHTML=
              'Server population: <span id="pop">'+e.total_population.toLocaleString()+'</span> · '+
              Object.keys(e.resources).length+' resources · '+
              'Trade volume: '+e.trade_volume.toFixed(0);
          }).catch(()=>{document.getElementById('stats').textContent='Server offline'});
          </script>
          </body>
          </html>
          LANDING
          cat > dist/play.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Xandaris II — Space Trading Game</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
              background: #0a0c14;
              color: #ccc;
              font-family: monospace;
              width: 100vw;
              height: 100vh;
              overflow: hidden;
            }
            #loading {
              position: fixed;
              top: 0; left: 0; right: 0; bottom: 0;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              z-index: 100;
              background: #0a0c14;
            }
            #loading h1 { color: #7fdbca; font-size: 2em; margin-bottom: 0.5em; }
            #loading p { color: #666; }
            #loading .spinner {
              width: 40px; height: 40px;
              border: 3px solid #333;
              border-top: 3px solid #7fdbca;
              border-radius: 50%;
              animation: spin 1s linear infinite;
              margin: 1em;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
            #server-info {
              position: fixed;
              bottom: 8px; right: 8px;
              font-size: 11px;
              color: #444;
              z-index: 50;
            }
            #server-info a { color: #557; text-decoration: none; }
          </style>
          </head>
          <body>
          <div id="loading">
            <h1>Xandaris II</h1>
            <div class="spinner"></div>
            <p id="load-status">Loading game...</p>
          </div>
          <div id="server-info">
            Live server: <a href="https://api.xandaris.space/api/game" target="_blank">API</a>
          </div>
          <script src="wasm_exec.js"></script>
          <script>
            const status = document.getElementById('load-status');
            if (!WebAssembly.instantiateStreaming) {
                WebAssembly.instantiateStreaming = async (resp, importObject) => {
                    const source = await (await resp).arrayBuffer();
                    return await WebAssembly.instantiate(source, importObject);
                };
            }
            status.textContent = 'Downloading game (~20MB)...';
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
                status.textContent = 'Starting...';
                go.run(result.instance);
                // Hide loading screen once canvas appears
                const check = setInterval(() => {
                  const canvas = document.querySelector('canvas');
                  if (canvas) {
                    document.getElementById('loading').style.display = 'none';
                    clearInterval(check);
                  }
                }, 100);
            }).catch(err => {
                status.textContent = 'Failed to load: ' + err.message;
                status.style.color = '#f66';
            });
          </script>
          </body>
          </html>
          EOF

      - name: Create live dashboard
        run: |
          cat > dist/live.html <<'DASHBOARD'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Xandaris II — Live Economy</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background: #0a0c14; color: #c0c8d8; font-family: 'Courier New', monospace; padding: 20px; }
            h1 { color: #7fdbca; margin-bottom: 4px; }
            .subtitle { color: #556; margin-bottom: 20px; font-size: 14px; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1000px; }
            .panel { background: #12162a; border: 1px solid #1e2844; border-radius: 6px; padding: 16px; }
            .panel h2 { color: #7fdbca; font-size: 14px; margin-bottom: 12px; border-bottom: 1px solid #1e2844; padding-bottom: 6px; }
            table { width: 100%; border-collapse: collapse; font-size: 13px; }
            th { text-align: left; color: #889; padding: 4px 8px; }
            td { padding: 4px 8px; }
            .green { color: #6dcc6d; }
            .red { color: #cc5555; }
            .orange { color: #ccaa44; }
            .dim { color: #556; }
            .status { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #444; }
            .status.live { color: #4a4; }
            .status.dead { color: #a44; }
            #error { color: #c44; padding: 20px; display: none; }
            @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
          </style>
          </head>
          <body>
          <h1>Xandaris II — Live Economy</h1>
          <p class="subtitle">Real-time data from production server • <a href="./" style="color:#557">Play Game</a></p>
          <div id="error">Cannot reach server. Is it running?</div>
          <div class="grid">
            <div class="panel">
              <h2>Market Prices</h2>
              <table><thead><tr><th>Resource</th><th>Buy</th><th>Base</th><th>Ratio</th><th>Scarcity</th></tr></thead>
              <tbody id="market"></tbody></table>
            </div>
            <div class="panel">
              <h2>Players</h2>
              <table><thead><tr><th>Name</th><th>Credits</th><th>Pop</th><th>Mines</th><th>Stock</th></tr></thead>
              <tbody id="players"></tbody></table>
            </div>
            <div class="panel">
              <h2>Galaxy Flows</h2>
              <table><thead><tr><th>Resource</th><th>Production</th><th>Consumption</th><th>Net</th></tr></thead>
              <tbody id="flows"></tbody></table>
            </div>
            <div class="panel">
              <h2>Game Info</h2>
              <div id="gameinfo"></div>
            </div>
          </div>
          <div id="statusbar" class="status">Connecting...</div>
          <script>
          const API = 'https://api.xandaris.space';
          async function refresh() {
            try {
              const [econ, players, flows, game] = await Promise.all([
                fetch(API+'/api/economy').then(r=>r.json()),
                fetch(API+'/api/players').then(r=>r.json()),
                fetch(API+'/api/flows').then(r=>r.json()),
                fetch(API+'/api/game').then(r=>r.json()),
              ]);
              // Market
              const m = document.getElementById('market');
              m.innerHTML = Object.entries(econ.data.resources).sort().map(([n,r]) => {
                const rc = r.price_ratio > 1.5 ? 'red' : r.price_ratio > 0.8 ? '' : 'green';
                const sc = r.scarcity === 'Scarce' || r.scarcity === 'Critical' ? 'orange' : r.scarcity === 'Depleted' ? 'red' : 'dim';
                return `<tr><td>${n}</td><td class="${rc}">${r.buy_price.toFixed(0)}</td><td class="dim">${r.base_price}</td><td class="${rc}">${r.price_ratio.toFixed(1)}x</td><td class="${sc}">${r.scarcity}</td></tr>`;
              }).join('');
              // Players
              const p = document.getElementById('players');
              p.innerHTML = players.data.sort((a,b)=>b.credits-a.credits).map(pl => {
                const cc = pl.credits < 100 ? 'red' : pl.credits < 500 ? 'orange' : '';
                return `<tr><td>${pl.name}</td><td class="${cc}">${pl.credits}</td><td>${pl.population}</td><td>${pl.mines}</td><td>${pl.stock}</td></tr>`;
              }).join('');
              // Flows
              const f = document.getElementById('flows');
              const allRes = new Set([...Object.keys(flows.data.production), ...Object.keys(flows.data.consumption)]);
              f.innerHTML = [...allRes].sort().map(r => {
                const prod = (flows.data.production[r]||0).toFixed(1);
                const cons = (flows.data.consumption[r]||0).toFixed(1);
                const net = (flows.data.net_flow[r]||0).toFixed(1);
                const nc = net > 0 ? 'green' : net < -1 ? 'red' : '';
                return `<tr><td>${r}</td><td class="green">+${prod}</td><td class="red">-${cons}</td><td class="${nc}">${net > 0 ? '+' : ''}${net}</td></tr>`;
              }).join('');
              // Game info
              const g = game.data;
              document.getElementById('gameinfo').innerHTML = `
                <p>Tick: ${g.tick} • Time: ${g.game_time} • Speed: ${g.speed}</p>
                <p>Systems: ${g.systems} • Players: ${g.players}</p>
                <p>Population: ${econ.data.total_population.toLocaleString()}</p>
                <p>Total Credits: ${econ.data.total_credits.toLocaleString()}</p>
                <p>Trade Volume: ${econ.data.trade_volume.toFixed(0)}</p>
              `;
              document.getElementById('statusbar').textContent = `Live • Updated ${new Date().toLocaleTimeString()}`;
              document.getElementById('statusbar').className = 'status live';
              document.getElementById('error').style.display = 'none';
            } catch(e) {
              document.getElementById('error').style.display = 'block';
              document.getElementById('statusbar').textContent = 'Disconnected';
              document.getElementById('statusbar').className = 'status dead';
            }
          }
          refresh();
          setInterval(refresh, 3000);
          </script>
          </body>
          </html>
          DASHBOARD

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
