name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Build
        run: |
          mkdir dist
          GOOS=js GOARCH=wasm go build -o dist/main.wasm .
          cp $(go env GOROOT)/lib/wasm/wasm_exec.js dist/
          cp -r assets dist/
          cat > dist/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Xandaris II — Space Trading Game</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
              background: #0a0c14;
              color: #ccc;
              font-family: monospace;
              width: 100vw;
              height: 100vh;
              overflow: hidden;
            }
            #loading {
              position: fixed;
              top: 0; left: 0; right: 0; bottom: 0;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              z-index: 100;
              background: #0a0c14;
            }
            #loading h1 { color: #7fdbca; font-size: 2em; margin-bottom: 0.5em; }
            #loading p { color: #666; }
            #loading .spinner {
              width: 40px; height: 40px;
              border: 3px solid #333;
              border-top: 3px solid #7fdbca;
              border-radius: 50%;
              animation: spin 1s linear infinite;
              margin: 1em;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
            #server-info {
              position: fixed;
              bottom: 8px; right: 8px;
              font-size: 11px;
              color: #444;
              z-index: 50;
            }
            #server-info a { color: #557; text-decoration: none; }
          </style>
          </head>
          <body>
          <div id="loading">
            <h1>Xandaris II</h1>
            <div class="spinner"></div>
            <p id="load-status">Loading game...</p>
          </div>
          <div id="server-info">
            Live server: <a href="http://3.84.241.200:8080/api/game" target="_blank">API</a>
          </div>
          <script src="wasm_exec.js"></script>
          <script>
            const status = document.getElementById('load-status');
            if (!WebAssembly.instantiateStreaming) {
                WebAssembly.instantiateStreaming = async (resp, importObject) => {
                    const source = await (await resp).arrayBuffer();
                    return await WebAssembly.instantiate(source, importObject);
                };
            }
            status.textContent = 'Downloading game (~20MB)...';
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
                status.textContent = 'Starting...';
                go.run(result.instance);
                // Hide loading screen once canvas appears
                const check = setInterval(() => {
                  const canvas = document.querySelector('canvas');
                  if (canvas) {
                    document.getElementById('loading').style.display = 'none';
                    clearInterval(check);
                  }
                }, 100);
            }).catch(err => {
                status.textContent = 'Failed to load: ' + err.message;
                status.style.color = '#f66';
            });
          </script>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
