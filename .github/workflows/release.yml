name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      short_sha: ${{ steps.short_sha.outputs.sha }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Get short SHA
        id: short_sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.short_sha.outputs.sha }}
          release_name: Release ${{ steps.short_sha.outputs.sha }}
          draft: true
          prerelease: false

  build-linux:
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev libasound2-dev
      - name: Build
        run: |
          go build -v -o xandaris-ii
          go build -v -o xandaris-agent ./cmd/agent/
      - name: Archive
        run: tar -czvf xandaris-ii-linux-amd64.tar.gz xandaris-ii xandaris-agent assets
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ./xandaris-ii-linux-amd64.tar.gz
          asset_name: xandaris-ii-linux-amd64.tar.gz
          asset_content_type: application/gzip

  build-windows:
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'
      - name: Build
        run: GOOS=windows GOARCH=amd64 go build -v -o xandaris-ii.exe -ldflags="-H=windowsgui"
      - name: Archive
        run: zip -r xandaris-ii-windows-amd64.zip xandaris-ii.exe assets
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ./xandaris-ii-windows-amd64.zip
          asset_name: xandaris-ii-windows-amd64.zip
          asset_content_type: application/zip

  build-mac:
    runs-on: macos-latest
    needs: create_release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'
      - name: Build
        run: go build -v -o xandaris-ii
      - name: Archive
        run: zip -r xandaris-ii-macos-amd64.zip xandaris-ii assets
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ./xandaris-ii-macos-amd64.zip
          asset_name: xandaris-ii-macos-amd64.zip
          asset_content_type: application/zip

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: [build-linux, create_release]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev libasound2-dev
      - name: Build server and agent binaries
        run: |
          go build -v -o xandaris-server
          go build -v -o xandaris-agent ./cmd/agent/
      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          SCP="scp -o StrictHostKeyChecking=no -i ~/.ssh/key.pem"
          SSH="ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ec2-user@$EC2_HOST"

          # Upload binaries
          $SCP xandaris-server ec2-user@$EC2_HOST:/home/ec2-user/xandaris-server-new
          $SCP xandaris-agent ec2-user@$EC2_HOST:/home/ec2-user/xandaris-agent-new

          # Create agent systemd service if it doesn't exist
          $SSH "if [ ! -f /etc/systemd/system/xandaris-agent.service ]; then
            sudo tee /etc/systemd/system/xandaris-agent.service > /dev/null <<'SVCEOF'
          [Unit]
          Description=Xandaris LLM Agent
          After=network.target xandaris.service
          Wants=xandaris.service

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/home/ec2-user
          ExecStart=/home/ec2-user/xandaris-agent --server http://localhost:8080 --game-key e4287f2503866497ce414a00c55f4581 --turns 999999 --interval 30s --model z-ai/glm-4.7-flash
          Environment=OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          SVCEOF
            sudo systemctl daemon-reload
            sudo systemctl enable xandaris-agent
          fi"

          # Update OpenRouter key in service file
          $SSH "sudo sed -i 's|^Environment=OPENROUTER_API_KEY=.*|Environment=OPENROUTER_API_KEY=${OPENROUTER_API_KEY}|' /etc/systemd/system/xandaris-agent.service && sudo systemctl daemon-reload"

          # Swap server binary and restart
          $SSH "chmod +x /home/ec2-user/xandaris-server-new && \
                sudo systemctl stop xandaris && \
                mv /home/ec2-user/xandaris-server-new /home/ec2-user/xandaris-server && \
                sudo systemctl start xandaris && \
                sleep 2 && \
                sudo systemctl is-active xandaris"

          # Swap agent binary and restart
          $SSH "chmod +x /home/ec2-user/xandaris-agent-new && \
                sudo systemctl stop xandaris-agent 2>/dev/null || true && \
                mv /home/ec2-user/xandaris-agent-new /home/ec2-user/xandaris-agent && \
                sudo systemctl start xandaris-agent && \
                sleep 2 && \
                sudo systemctl is-active xandaris-agent"

  publish_release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-mac, create_release]
    steps:
      - name: Publish Release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create_release.outputs.release_id }},
              draft: false
            });
